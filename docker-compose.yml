services:
  lunchmoneypay-db:
    image: postgres:16
    container_name: lunchmoneypay-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lunchmoneypay_dev
      POSTGRES_USER: lunchmoneypay
      POSTGRES_PASSWORD: lunchmoneypay_dev_password
    ports:
      - "5433:5432"
    volumes:
      - lunchmoneypay_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lunchmoneypay -d lunchmoneypay_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lunchmoneypay_postgres_data:
